<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트시티 역량 인증제 평가 시스템 - 로그인</title>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

        /* =========================================
           1. 전체 화면 및 배경 설정 (PC 골격 고정 🔒)
        ========================================= */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Pretendard', sans-serif; 
            
            background-color: #ef8516; 
            background-image: url('img/pc_bg.png'); 
            
            background-size: cover; 
            background-position: center center; 
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            height: 100vh; 
            display: flex; 
            flex-direction: row;
            
            justify-content: flex-end; 
            align-items: flex-start; 
            
            overflow: hidden;
            position: relative;
        }

        .left-spacer { flex: 5; }

        /* 오른쪽 로그인 구역 (PC 골격 고정 🔒) */
        .right-content {
            flex: 5; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            
            /* ★ 선생님 요청대로 PC 화면 10vh로 고정 완료! */
            padding-top: 10vh; 
            padding-right: 7vw; 
        }

        /* =========================================
           2. 맑은 화이트 베이스 + 발광 테두리 (PC 고정 🔒)
        ========================================= */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            
            max-width: 480px; 
            min-height: 630px; 
            
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 255, 255, 0.9); 
            box-shadow: 
                inset 0 0 25px rgba(255, 255, 255, 0.7), 
                inset 0 0 5px rgba(255, 255, 255, 1),    
                0 15px 35px rgba(0, 0, 0, 0.15);         
                
            border-radius: 20px;
            padding: 40px 35px; 
            text-align: center;
            box-sizing: border-box; 
            
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* =========================================
           3. 공통 UI 요소 (PC 고정 🔒)
        ========================================= */
        .logo-area { margin-bottom: 25px; }
        .sub-title { font-size: 14px; color: #d35400; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; }
        .main-title { font-size: 24px; color: #1a252f; font-weight: 900; margin: 0 0 25px 0; letter-spacing: 0.5px; line-height: 1.35; word-break: keep-all;}

        .tab-container { display: flex; margin-bottom: 25px; background: rgba(255,255,255,0.6); border-radius: 10px; padding: 5px; border: 1px solid rgba(255,255,255,0.8); box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { flex: 1; padding: 14px; border: none; background: transparent; color: #555; font-size: 15px; font-weight: bold; border-radius: 7px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #2c3e50; color: white; box-shadow: 0 2px 10px rgba(44, 62, 80, 0.3); }

        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; font-size: 13px; color: #2c3e50; margin-bottom: 8px; font-weight: 800; }
        .form-control {
            width: 100%; padding: 16px; border: 1px solid rgba(255,255,255,1); border-radius: 8px; 
            background: rgba(255,255,255,0.8); color: #1a252f; font-size: 15px; font-weight: bold; box-sizing: border-box; outline: none; transition: 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .form-control:focus { border-color: #3498db; background: #ffffff; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);}
        .form-control::placeholder { color: #95a5a6; font-weight: normal;}

        .auto-login-wrap { text-align: left; margin-bottom: 25px; font-size: 13px; color: #34495e; font-weight: bold; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .auto-login-wrap input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #2c3e50;}

        .btn-login { width: 100%; padding: 18px; border: none; border-radius: 8px; background: linear-gradient(135deg, #2c3e50, #34495e); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 12px rgba(44, 62, 80, 0.3); margin-top: 5px; letter-spacing: 1px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(44, 62, 80, 0.5); }
        .btn-login:active { transform: translateY(1px); }

        .helper-text { margin-top: 25px; font-size: 12px; color: #555; line-height: 1.5; }
        .helper-text span { color: #d35400; font-weight: 900; }

        /* =======================================================
           4. ★ 모바일 최적화 (여백 최소화로 SMART 글자 구출 작전!) 📱
        ======================================================= */
        @media (max-width: 800px) {
            body { 
                flex-direction: column;
                justify-content: flex-start;
                align-items: center; 
                background-image: url('img/mobile_bg.png'); 
                background-position: center top; 
                background-attachment: scroll; 
            }
            .left-spacer { display: none; } 
            
            .right-content {
                width: 100%; flex: none; height: 90vh; padding: 0; margin: 0;
                display: block; position: relative; 
            }
            
            .login-container { 
                position: absolute; 
                left: 50%; 
                transform: translateX(-50%); 
                top: 18%; 
                width: calc(100% - 40px); 
                max-width: 360px; 
                
                min-height: auto; 
                height: auto; 
                padding: 15px 20px 15px 20px; 
                border-radius: 16px; 
                justify-content: flex-start;
            }

            .logo-area { margin-bottom: 8px; } 
            .sub-title { font-size: 11px; margin-bottom: 2px; }
            .main-title { font-size: 16px; margin-bottom: 8px; line-height: 1.2; } 
            
            .tab-container { margin-bottom: 10px; padding: 2px; } 
            .tab-btn { padding: 6px; font-size: 12px; } 
            
            .form-group { margin-bottom: 6px; } 
            .form-group label { margin-bottom: 3px; font-size: 11px; }
            .form-control { padding: 8px; font-size: 13px; } 
            
            .auto-login-wrap { margin-bottom: 10px; font-size: 11px; }
            .btn-login { padding: 10px; font-size: 14px; margin-top: 0; } 
            
            .helper-text { margin-top: 10px; font-size: 10px; line-height: 1.3; }
        }
    </style>
    <link rel="apple-touch-icon" href="img/app_icon.png">
    <link rel="manifest" href="img/manifest.json">
    <link rel="icon" type="image/png" href="img/app_icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="스마트시티">
<link rel="apple-touch-startup-image" href="img/splash.png">
</head>
<body>

    <div class="left-spacer"></div>

    <div class="right-content">
        <div class="login-container">
            <div class="logo-area">
                <div class="sub-title">협약형 특성화고</div>
                <h1 class="main-title">스마트시티 역량 인증제<br>평가 시스템</h1>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" id="tabStudent">🧑‍🎓 학생</button>
                <button class="tab-btn" id="tabTeacher">👨‍🏫 교사</button>
            </div>

            <div id="loginFormArea">
                <div class="form-group">
                    <label id="lblId">학번 (5자리)</label>
                    <input type="number" id="inputId" class="form-control" placeholder="예: 10101" pattern="\d*">
                </div>
                <div class="form-group">
                    <label id="lblPw">비밀번호</label>
                    <input type="password" id="inputPw" class="form-control" placeholder="초기비밀번호: 생년월일 6자리">
                </div>
                
                <label class="auto-login-wrap">
                    <input type="checkbox" id="chkAutoLogin"> 로그인 상태 유지 (공용 PC 금지)
                </label>

                <button class="btn-login" id="btnLogin">로그인</button>
            </div>
            
            <div class="helper-text" id="helperText">
                학생 초기 비밀번호는 <span>생년월일 6자리</span>입니다.<br>
                (비밀번호 분실 시 담임선생님께 문의하세요)
            </div>
            <footer style="text-align: center; margin-top: 17px; font-size: 12px; color: #333333; font-weight: 700; opacity: 1;">
                © 스마트시티 역량 인증제 | Developed by [주현준]
            </footer>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🚨 아래 빈칸에 선생님의 firebaseConfig 객체를 다시 넣어주세요! 🚨
        const firebaseConfig = {
  apiKey: "AIzaSyDDdAUuybOEyV0-TSOuRCZbNJQaWwTA-kg",
  authDomain: "induk-smartcity.firebaseapp.com",
  projectId: "induk-smartcity",
  storageBucket: "induk-smartcity.firebasestorage.app",
  messagingSenderId: "836222545739",
  appId: "1:836222545739:web:d370e05c68300ce6e202ce",
  measurementId: "G-3SL84TXVHD"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentMode = 'student';

        window.switchTab = function(mode) {
            currentMode = mode;
            document.getElementById('inputId').value = "";
            document.getElementById('inputPw').value = "";

            if (mode === 'student') {
                document.getElementById('tabStudent').classList.add('active');
                document.getElementById('tabTeacher').classList.remove('active');
                document.getElementById('lblId').innerText = "학번 (5자리)";
                document.getElementById('inputId').placeholder = "예: 10101";
                document.getElementById('inputId').type = "number";
                document.getElementById('inputPw').placeholder = "초기비밀번호: 생년월일 6자리";
                document.getElementById('helperText').innerHTML = "학생 초기 비밀번호는 <span>생년월일 6자리</span>입니다.<br>(비밀번호 분실 시 담임선생님께 문의하세요)";
            } else {
                document.getElementById('tabTeacher').classList.add('active');
                document.getElementById('tabStudent').classList.remove('active');
                document.getElementById('lblId').innerText = "교사 아이디";
                document.getElementById('inputId').placeholder = "발급된 ID";
                document.getElementById('inputId').type = "text";
                document.getElementById('inputPw').placeholder = "비밀번호 입력";
                document.getElementById('helperText').innerHTML = "시스템 관리 및 평가 권한을 가진 <span>교사 전용</span>입니다.<br>최초 접속 시 최고관리자 계정으로 로그인하세요.";
            }
        }

        document.getElementById('tabStudent').addEventListener('click', () => switchTab('student'));
        document.getElementById('tabTeacher').addEventListener('click', () => switchTab('teacher'));

        // ★ [보안 강화 완료] 파이어베이스 진짜 자물쇠 로직 장착 + 교사 세부 권한 로드
        document.getElementById('btnLogin').addEventListener('click', async function(e) {
            e.preventDefault();
            const idVal = document.getElementById('inputId').value.trim();
            const pwVal = document.getElementById('inputPw').value.trim();

            if(!idVal || !pwVal) return alert("아이디와 비밀번호를 모두 입력해주세요.");

            const btn = document.getElementById('btnLogin');
            btn.innerText = "확인 중...";
            btn.disabled = true;

            try {
                // 현재 탭에 따라 찾을 폴더 결정
                const collectionName = (currentMode === 'student') ? "students" : "teachers";
                
                // 파이어베이스에서 해당 아이디 문서 찾아오기
                const docRef = doc(db, collectionName, idVal);
                const userDoc = await getDoc(docRef);

                // 아이디가 존재하고, 비밀번호가 일치하는지 확인
                if (userDoc.exists() && userDoc.data().password === pwVal) {
                    const userData = userDoc.data();
                    
                    // 합격! 신분증(Session) 발급
                    sessionStorage.setItem('loginUserId', idVal);
                    sessionStorage.setItem('loginName', userData.name);
                    sessionStorage.setItem('userRole', userData.role || 'student');
                    
                    // ★ 추가된 부분: 교사인 경우 권한과 담당과목을 세션에 추가로 저장!
                    if(collectionName === 'teachers') {
                        sessionStorage.setItem('roleDetail', userData.roleDetail || '일반교사');
                        sessionStorage.setItem('assignment', userData.assignment || '-');
                    }

                    // 직급(role)에 맞춰 자동으로 방 안내
                    if (userData.role === 'admin') {
                        window.location.href = "admin.html";
                    } else if (userData.role === 'teacher') {
                        window.location.href = "teacher.html";
                    } else {
                        window.location.href = "student.html";
                    }
                } else {
                    alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                }
            } catch(error) {
                console.error("Login Error:", error);
                alert("로그인 처리 중 오류가 발생했습니다. 인터넷 연결을 확인해주세요.");
            } finally {
                btn.innerText = "로그인";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
