<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트시티 명예의 전당 (TV 송출용 LIVE)</title>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

        :root {
            --primary-blue: #3b71ca;
            --dark-blue: #1a252f;
            --bg-main: #f0f4f8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-main);
            color: var(--dark-blue);
            height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* 1. 상단 전광판 헤더 (가로형 기본) */
        .tv-header {
            background: linear-gradient(135deg, var(--dark-blue), #2c3e50);
            color: white; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative; z-index: 10;
        }
        .header-logo { display: flex; align-items: center; gap: 20px; }
        .header-icon { width: 45px; height: 45px; background: white; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 26px; }
        .header-text h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);}
        .header-text p { margin: 5px 0 0 0; font-size: 15px; color: #bdc3c7; font-weight: bold;}
        
        .header-time { text-align: right; }
        .live-badge { display: inline-block; background: #e74c3c; color: white; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 900; margin-bottom: 5px; animation: blink 1.5s infinite;}
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .clock { font-size: 22px; font-weight: 900; font-family: monospace;}

        /* 2. 3기둥 레이아웃 (가로형 기본) */
        .ranking-container {
            display: flex; flex: 1; gap: 20px; padding: 20px 40px; 
            box-sizing: border-box; flex-direction: row; /* 기본은 가로 나열 */
        }

        .grade-column {
            flex: 1; background: white; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; overflow: hidden;
            border: 2px solid #edf0f2;
        }

        .grade-title {
            text-align: center; padding: 18px 0; background: #fff;
            border-bottom: 2px solid #f1f2f6; position: relative;
        }
        .grade-title h2 { margin: 0; font-size: 24px; font-weight: 900; color: var(--dark-blue);}
        
        .col-1 .grade-title h2 { color: #27ae60; }
        .col-2 .grade-title h2 { color: var(--primary-blue); }
        .col-3 .grade-title h2 { color: #8e44ad; }

        .ranking-list { padding: 15px 20px; flex: 1; display: flex; flex-direction: column; gap: 8px;}

        /* 3. 랭킹 카드 디자인 (가로형 기본) */
        .top-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; border-radius: 14px; color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); margin-bottom: 2px;
            animation: slideIn 0.4s ease-out forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .top-1 { background: linear-gradient(135deg, #f1c40f, #f39c12); transform: scale(1.02); }
        .top-2 { background: linear-gradient(135deg, #bdc3c7, #95a5a6); color: #2c3e50;}
        .top-3 { background: linear-gradient(135deg, #e67e22, #d35400); }

        .rank-info { display: flex; align-items: center; gap: 12px; }
        .medal-img { width: 35px; height: 35px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
        
        .student-detail { display: flex; flex-direction: column; }
        .student-detail h4 { margin: 0 0 2px 0; font-size: 19px; font-weight: 900; letter-spacing: -0.5px;}
        .student-detail p { margin: 0; font-size: 12px; opacity: 0.9; font-weight: 600;}
        
        .score-display { text-align: right; }
        .score-display h3 { margin: 0; font-size: 22px; font-weight: 900;}

        .normal-rank {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px; background: #f8f9fa; border-radius: 10px;
            border: 1px solid #edf0f2;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .normal-rank:nth-child(even) { background: #fff; }

        .normal-info { display: flex; align-items: center; gap: 12px; }
        .rank-num { font-size: 16px; font-weight: 900; color: #7f8c8d; width: 25px; text-align: center;}
        .normal-name { font-size: 16px; font-weight: 900; color: var(--dark-blue);}
        .normal-class { font-size: 12px; color: var(--text-gray); font-weight: bold; margin-left: 5px;}
        .normal-score { font-size: 16px; font-weight: 900; color: var(--primary-blue);}

        .loading-msg { text-align: center; padding: 50px; font-size: 18px; color: var(--text-gray); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* =========================================================
           🔥 [핵심 마법] TV가 '세로형'으로 회전했을 때 (Portrait Mode)
           ========================================================= */
        @media screen and (orientation: portrait) {
            /* 1. 헤더 다이어트 */
            .tv-header { padding: 15px 20px; }
            .header-text h1 { font-size: 22px; }
            .header-text p { font-size: 12px; }
            .header-icon { width: 35px; height: 35px; font-size: 20px; }
            .clock { font-size: 16px; }
            .live-badge { font-size: 11px; padding: 3px 8px; margin-bottom: 2px;}

            /* 2. 3기둥을 세로 3단 케이크 층쌓기로 변경 */
            .ranking-container {
                flex-direction: column; /* 세로로 쌓기 */
                gap: 15px; 
                padding: 15px 20px; 
            }

            /* 3. 각 학년 박스 높이 조절 및 여백 다이어트 */
            .grade-title { padding: 10px 0; }
            .grade-title h2 { font-size: 18px; }
            .ranking-list { padding: 8px 12px; gap: 4px;}

            /* 4. 카드 두께와 글씨 크기를 팍 줄여서 한 화면에 다 들어가게 압축 */
            .top-card { padding: 8px 12px; margin-bottom: 0px;}
            .medal-img { width: 28px; height: 28px; }
            .student-detail h4 { font-size: 16px; }
            .student-detail p { font-size: 11px; }
            .score-display h3 { font-size: 18px; }

            .normal-rank { padding: 6px 12px; border-radius: 8px; }
            .rank-num { font-size: 14px; width: 20px; }
            .normal-name { font-size: 14px; }
            .normal-class { font-size: 11px; }
            .normal-score { font-size: 14px; }
        }
    </style>
</head>
<body>

    <script>
        // 🚨 실제 API 키를 입력하세요.
        window.MY_GLOBAL_FIREBASE_CONFIG = {
            apiKey: "AIzaSyDDdAUuybOEyV0-TSOuRCZbNJQaWwTA-kg",
  authDomain: "induk-smartcity.firebaseapp.com",
  projectId: "induk-smartcity",
  storageBucket: "induk-smartcity.firebasestorage.app",
  messagingSenderId: "836222545739",
  appId: "1:836222545739:web:d370e05c68300ce6e202ce",
  measurementId: "G-3SL84TXVHD"
        };
    </script>

    <header class="tv-header">
        <div class="header-logo">
            <div class="header-icon">🏫</div>
            <div class="header-text">
                <h1>스마트시티 9대 역량 명예의 전당</h1>
                <p>인덕과학기술고등학교 실시간 랭킹 현황</p>
            </div>
        </div>
        <div class="header-right">
            <div class="header-time">
                <div class="live-badge">🔴 LIVE UPDATE</div>
                <div class="clock" id="liveClock">0000.00.00 00:00:00</div>
            </div>
        </div>
    </header>

    <div class="ranking-container">
        
        <div class="grade-column col-1">
            <div class="grade-title">
                <h2>🌱 1학년 TOP 10 (스타터)</h2>
            </div>
            <div class="ranking-list" id="list-grade-1">
                <div class="loading-msg">시스템 연결 중... 📡</div>
            </div>
        </div>

        <div class="grade-column col-2">
            <div class="grade-title">
                <h2>👑 2학년 TOP 10 (빌더)</h2>
            </div>
            <div class="ranking-list" id="list-grade-2">
                <div class="loading-msg">시스템 연결 중... 📡</div>
            </div>
        </div>

        <div class="grade-column col-3">
            <div class="grade-title">
                <h2>💎 3학년 TOP 10 (프로)</h2>
            </div>
            <div class="ranking-list" id="list-grade-3">
                <div class="loading-msg">시스템 연결 중... 📡</div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. 파이어베이스 초기화 (로그인 모듈 아예 삭제!)
        const app = initializeApp(window.MY_GLOBAL_FIREBASE_CONFIG);
        const db = getFirestore(app);

        const medals = [
            'https://cdn-icons-png.flaticon.com/512/2583/2583344.png',
            'https://cdn-icons-png.flaticon.com/512/2583/2583319.png',
            'https://cdn-icons-png.flaticon.com/512/2583/2583434.png'
        ];

        // 2. 단 3개의 문서(grade_1, 2, 3)만 감시하여 요금 0원 유지
        for(let g = 1; g <= 3; g++) {
            onSnapshot(doc(db, "publicRankingBoard", `grade_${g}`), (docSnap) => {
                const listEl = document.getElementById(`list-grade-${g}`);
                listEl.innerHTML = '';
                
                // 데이터가 있고, top10 배열이 비어있지 않다면 화면에 그리기
                if(docSnap.exists() && docSnap.data().top10 && docSnap.data().top10.length > 0) {
                    const top10 = docSnap.data().top10;
                    
                    top10.forEach((student, index) => {
                        // 1, 2, 3등은 특별한 카드 디자인
                        if (index < 3) {
                            listEl.innerHTML += `
                                <div class="top-card top-${index + 1}" style="animation-delay: ${index * 0.1}s">
                                    <div class="rank-info">
                                        <img src="${medals[index]}" class="medal-img" alt="${index+1}등">
                                        <div class="student-detail">
                                            <h4>${student.name}</h4>
                                            <p>${student.classStr}반</p>
                                        </div>
                                    </div>
                                    <div class="score-display">
                                        <h3>${student.score}점</h3>
                                    </div>
                                </div>
                            `;
                        } 
                        // 4등부터 10등은 일반 리스트 디자인
                        else {
                            listEl.innerHTML += `
                                <div class="normal-rank" style="animation-delay: ${index * 0.1}s">
                                    <div class="normal-info">
                                        <div class="rank-num">${index + 1}</div>
                                        <div class="normal-name">${student.name} <span class="normal-class">(${student.classStr}반)</span></div>
                                    </div>
                                    <div class="normal-score">${student.score}점</div>
                                </div>
                            `;
                        }
                    });
                } else {
                    // 데이터가 비어있을 때
                    listEl.innerHTML = '<div class="loading-msg" style="animation:none;">아직 랭킹에 등록된 학생이 없습니다.</div>';
                }
            });
        }
    </script>

    <script>
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('liveClock').innerText = `${year}.${month}.${day} ${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
