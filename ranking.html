<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 스마트시티 실시간 명예의 전당</title>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
        
        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background-color: #f4f6f9; color: #2c3e50; }
        .header { background-color: #1a252f; color: white; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .header h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
        .header p { margin: 5px 0 0 0; color: #f1c40f; font-weight: bold; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .ranking-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; } 
        
        .grade-panel { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #edf0f2;}
        .grade-panel h2 { margin: 0 0 20px 0; text-align: center; color: #1a252f; font-size: 22px; font-weight: 900; padding-bottom: 15px; border-bottom: 2px solid #f4f6f9;}
        
        .rank-card { display: flex; align-items: center; padding: 15px 20px; border-radius: 15px; color: white; justify-content: space-between; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.3s;}
        .rank-card:hover { transform: translateY(-3px); }
        .rank-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .medal { font-size: 30px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        
        .rank-details h4 { margin: 0; font-size: 18px; font-weight: 900; }
        .rank-details p { margin: 3px 0 0 0; font-size: 13px; opacity: 0.9; font-weight: 600;}
        .rank-score { font-size: 22px; font-weight: 900; }
        
        .rank-1 { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .rank-2 { background: linear-gradient(135deg, #bdc3c7, #95a5a6); }
        .rank-3 { background: linear-gradient(135deg, #e67e22, #d35400); }
        
        .normal-rank { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: #f8f9fa; border-radius: 12px; border: 1px solid #edf0f2; margin-bottom: 10px;}
        .normal-info { display: flex; align-items: center; gap: 15px; }
        .rank-num { font-size: 18px; font-weight: 900; color: #7f8c8d; width: 30px; text-align: center;}
        .normal-name { font-size: 16px; font-weight: 900; color: #2c3e50;}
        .normal-class { font-size: 13px; color: #7f8c8d; font-weight: bold; margin-left: 8px;}
        .normal-score { font-size: 18px; font-weight: 900; color: #3b71ca;}
        
        .loading { text-align: center; padding: 50px; font-size: 20px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏆 스마트시티 역량 인증 명예의 전당</h1>
        <p>🔴 실시간 순위 집계 중 (1분마다 자동 갱신)</p>
    </header>

    <div class="container">
        <div id="loading" class="loading">⏳ 실시간 데이터를 불러오는 중입니다...</div>
        <div class="ranking-grid" id="rankingGrid" style="display: none;">
            <div class="grade-panel" id="panel-1">
                <h2>🌱 1학년 TOP 5</h2>
                <div class="rank-list"></div>
            </div>
            <div class="grade-panel" id="panel-2">
                <h2>👑 2학년 TOP 5</h2>
                <div class="rank-list"></div>
            </div>
            <div class="grade-panel" id="panel-3">
                <h2>💎 3학년 TOP 5</h2>
                <div class="rank-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🚨 여기에 선생님의 실제 Firebase API 키 정보를 덮어쓰세요! 🚨
        const firebaseConfig = {
  apiKey: "AIzaSyDDdAUuybOEyV0-TSOuRCZbNJQaWwTA-kg",
  authDomain: "induk-smartcity.firebaseapp.com",
  projectId: "induk-smartcity",
  storageBucket: "induk-smartcity.firebasestorage.app",
  messagingSenderId: "836222545739",
  appId: "1:836222545739:web:d370e05c68300ce6e202ce",
  measurementId: "G-3SL84TXVHD"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const medals = ['🥇', '🥈', '🥉'];
        const rankClasses = ['rank-1', 'rank-2', 'rank-3'];

        async function loadLiveRankings() {
            try {
                const querySnapshot = await getDocs(collection(db, "students"));
                let gradeStudents = {1: [], 2: [], 3: []};

                querySnapshot.forEach(doc => {
                    let data = doc.data();
                    let g = data.current_grade;
                    if(g && gradeStudents[g] && data[`year_${g}`]) {
                        let classNum = parseInt(String(data.current_studentId).substring(1, 3), 10);
                        let sc = data[`year_${g}`].total_score || 0;
                        if(sc > 0) { // 점수가 0점인 학생은 제외
                            gradeStudents[g].push({
                                name: data.name,
                                classStr: `${g}-${classNum}`,
                                score: sc
                            });
                        }
                    }
                });

                // 각 학년별로 렌더링
                for(let g = 1; g <= 3; g++) {
                    gradeStudents[g].sort((a, b) => b.score - a.score); // 점수 높은 순 정렬
                    let top5 = gradeStudents[g].slice(0, 5); // 5등까지만 자르기
                    
                    const listContainer = document.querySelector(`#panel-${g} .rank-list`);
                    listContainer.innerHTML = ''; // 초기화

                    if(top5.length === 0) {
                        listContainer.innerHTML = '<div style="text-align:center; padding:30px; color:#7f8c8d; font-weight:bold;">아직 점수를 획득한 학생이 없습니다.</div>';
                        continue;
                    }

                    top5.forEach((student, index) => {
                        if(index < 3) {
                            listContainer.innerHTML += `
                                <div class="rank-card ${rankClasses[index]}">
                                    <div class="rank-info">
                                        <div class="medal">${medals[index]}</div>
                                        <div class="rank-details"><h4>${student.name}</h4><p>(${student.classStr})</p></div>
                                    </div>
                                    <div class="rank-score">${student.score}점</div>
                                </div>
                            `;
                        } else {
                            listContainer.innerHTML += `
                                <div class="normal-rank">
                                    <div class="normal-info">
                                        <div class="rank-num">${index + 1}</div>
                                        <div class="normal-name">${student.name}<span class="normal-class">(${student.classStr})</span></div>
                                    </div>
                                    <div class="normal-score">${student.score}점</div>
                                </div>
                            `;
                        }
                    });
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('rankingGrid').style.display = 'grid';

            } catch (error) {
                console.error("랭킹 로드 실패:", error);
                document.getElementById('loading').innerText = "데이터를 불러오는 중 오류가 발생했습니다. API 키를 확인해주세요.";
            }
        }

        // 페이지 열리자마자 1번 실행
        loadLiveRankings();

        // 60초(60000ms)마다 백그라운드에서 자동으로 순위 업데이트! (새로고침 불필요)
        setInterval(loadLiveRankings, 60000);

    </script>
</body>
</html>
