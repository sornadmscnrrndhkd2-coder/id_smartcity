<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트시티 역량 인증제 - 로그인</title>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; color: #333;
        }
        .login-card {
            background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 40px 30px; box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; animation: popIn 0.5s ease-out;
        }
        @keyframes popIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .logo-icon { font-size: 45px; margin-bottom: 10px; display: inline-block; }
        .login-card h1 { margin: 0 0 5px 0; font-size: 24px; font-weight: 900; color: #1a252f; letter-spacing: -0.5px;}
        .login-card p { margin: 0 0 30px 0; font-size: 14px; color: #7f8c8d; font-weight: 500;}

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: 800; color: #34495e; margin-bottom: 5px; margin-left: 5px;}
        .input-group input {
            width: 100%; padding: 15px; border: 2px solid #ecf0f1; border-radius: 12px; font-size: 15px;
            box-sizing: border-box; transition: all 0.3s; font-family: 'Pretendard'; outline: none; font-weight: bold;
        }
        .input-group input:focus { border-color: #3498db; box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1); }

        .btn-login {
            width: 100%; padding: 16px; background: #3498db; color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 900; cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        .btn-login:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52,152,219,0.3); }
        .btn-login:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; }

        .footer-text { margin-top: 25px; font-size: 12px; color: #95a5a6; }
        
        .error-msg { color: #e74c3c; font-size: 13px; font-weight: bold; margin-top: 15px; display: none; background: #fdedec; padding: 10px; border-radius: 8px;}
    </style>
</head>
<body>

    <div class="login-card">
        <span class="logo-icon">🏫</span>
        <h1>스마트시티 역량 인증제</h1>
        <p>통합 로그인 시스템</p>

        <form id="loginForm">
            <div class="input-group">
                <label>아이디 (학생은 학번 5자리)</label>
                <input type="text" id="userId" placeholder="학번 또는 아이디 입력" required autocomplete="username">
            </div>
            <div class="input-group">
                <label>비밀번호 (초기: 123456)</label>
                <input type="password" id="userPw" placeholder="비밀번호 입력" required autocomplete="current-password">
            </div>
            
            <div id="errorMsg" class="error-msg">아이디 또는 비밀번호가 맞지 않습니다.</div>

            <button type="submit" id="loginBtn" class="btn-login">로그인</button>
        </form>

        <div class="footer-text">
            ⓒ 2026 Induk Science & Technology High School
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🚨 여기에 선생님의 실제 Firebase API 키 7줄을 복사해서 넣어주세요! 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyDDdAUuybOEyV0-TSOuRCZbNJQaWwTA-kg",
  authDomain: "induk-smartcity.firebaseapp.com",
  projectId: "induk-smartcity",
  storageBucket: "induk-smartcity.firebasestorage.app",
  messagingSenderId: "836222545739",
  appId: "1:836222545739:web:d370e05c68300ce6e202ce",
  measurementId: "G-3SL84TXVHD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerText = '인증 확인 중... ⏳';

            let inputId = document.getElementById('userId').value.trim();
            const pw = document.getElementById('userPw').value.trim();
            let authEmail = inputId;

            // ★ 스마트 로그인 로직: 학번만 치면 알아서 이메일로 변환
            if (!authEmail.includes('@')) {
                if (/^\d{5}$/.test(inputId)) {
                    // 5자리 숫자면 학생!
                    authEmail = `stu_${inputId}@induk.hs.kr`;
                } else {
                    // 그 외 영문/숫자면 교사 또는 관리자!
                    authEmail = `${inputId}@induk.hs.kr`;
                }
            }

            try {
                // 1. Firebase Auth (은행급 보안) 로그인 시도
                const userCredential = await signInWithEmailAndPassword(auth, authEmail, pw);
                const uid = userCredential.user.uid;

                loginBtn.innerText = '권한 확인 중... 🔍';

                // 2. 권한 판별 (관리자 -> 교사 -> 학생 순으로 조회, 중간에 끊지 않음!)
                
                // [A] 최고 관리자 확인
                const adminSnap = await getDoc(doc(db, "admin_users", uid));
                if (adminSnap.exists()) {
                    sessionStorage.setItem('userRole', 'admin');
                    sessionStorage.setItem('loginName', adminSnap.data().name || '최고관리자');
                    location.replace('admin.html');
                    return; // 관리자면 여기서 종료하고 이동!
                }

                // [B] 교사 확인
                const teacherSnap = await getDoc(doc(db, "teachers", uid));
                if (teacherSnap.exists()) {
                    const tData = teacherSnap.data();
                    sessionStorage.setItem('userRole', 'teacher');
                    sessionStorage.setItem('loginName', tData.name || '교사');
                    sessionStorage.setItem('roleDetail', tData.roleDetail || '일반교사');
                    sessionStorage.setItem('assignment', tData.assignment || '-');
                    location.replace('teacher.html'); // 교사면 여기서 종료하고 이동!
                    return;
                }

                // [C] 학생 확인
                const studentSnap = await getDoc(doc(db, "students", uid));
                if (studentSnap.exists()) {
                    const sData = studentSnap.data();
                    sessionStorage.setItem('userRole', 'student');
                    sessionStorage.setItem('loginName', sData.name || '학생');
                    sessionStorage.setItem('studentId', sData.current_studentId || '');
                    sessionStorage.setItem('grade', sData.current_grade || '');
                    location.replace('student.html'); // 학생이면 여기서 종료하고 이동!
                    return;
                }

                // [D] 3군데 다 찾아봤는데도 없으면 그때서야 에러 발생!
                throw new Error("role_not_found");

            } catch (error) {
                console.error("로그인 실패:", error);
                errorMsg.style.display = 'block';
                
                if (error.message === "role_not_found") {
                    errorMsg.innerText = "계정은 있으나 시스템에 등록된 권한 정보가 없습니다.";
                } else if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorMsg.innerText = "아이디(학번) 또는 비밀번호를 다시 확인해주세요.";
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg.innerText = "로그인 실패가 반복되어 일시적으로 잠겼습니다. 잠시 후 다시 시도해주세요.";
                } else {
                    errorMsg.innerText = "로그인 시스템 오류가 발생했습니다. 관리자에게 문의하세요.";
                }
                
                loginBtn.disabled = false;
                loginBtn.innerText = '로그인';
                // 실패 시 찌꺼기 세션 방지를 위해 강제 로그아웃 처리
                auth.signOut();
            }
        });
    </script>
</body>
</html>
